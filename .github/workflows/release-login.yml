name: Publish Login Image
on:
  push:
    branches: [main]
    paths: ['apps/login/**']

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Build login app (with all dependencies)
        run: pnpm exec nx run @zitadel/login:build

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/login
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zitadel-login:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/zitadel-login:latest
